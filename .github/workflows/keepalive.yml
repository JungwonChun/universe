# Supabase 무료 플랜은 7일간 요청이 없으면 일시정지돼요.
# 이 워크플로가 매주 월/목 오전(KST 기준 09:00)에 자동으로 핑을 보내 정지를 막아줘요.
# GitHub 저장소 > Settings > Secrets and variables > Actions 에
# SUPABASE_URL, SUPABASE_ANON_KEY 두 개를 등록해야 동작합니다. (README 참고)

name: Supabase keep-alive

on:
  schedule:
    - cron: '0 0 * * 1,4'   # UTC 00:00 = 한국시간 09:00, 매주 월·목
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive?select=id" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "✅ ping ok"
